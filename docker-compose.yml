services:
  postgres:
    image: postgres:16-alpine
    container_name: little-scholar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: little_scholar
      POSTGRES_PASSWORD: little_scholar_password
      POSTGRES_DB: little_scholar
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U little_scholar -d little_scholar']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
