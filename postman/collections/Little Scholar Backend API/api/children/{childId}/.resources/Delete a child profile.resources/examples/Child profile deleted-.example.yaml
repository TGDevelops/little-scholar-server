$kind: http-example
name: Child profile deleted.
request:
  url: "{{baseUrl}}/api/children/:childId"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    childId: 802a6d85-86b6-ca28-2940-221245bb7f19
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "data": {
          "deleted": false
        }
      }
order: 1000
