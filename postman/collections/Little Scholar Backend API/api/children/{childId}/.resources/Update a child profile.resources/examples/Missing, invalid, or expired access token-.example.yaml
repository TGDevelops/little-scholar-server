$kind: http-example
name: Missing, invalid, or expired access token.
request:
  url: "{{baseUrl}}/api/children/:childId"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    childId: 802a6d85-86b6-ca28-2940-221245bb7f19
  body:
    type: json
    content: |-
      {
        "name": "string",
        "age": 6,
        "grade": "LKG",
        "avatarUrl": "https://dATeMawVw.juquBhpkGU+RVrEcG7XBlqw11YYsaSCA73VmVnC0nGjDqqzXLaOmRvv"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": {
          "message": "Authentication required"
        }
      }
order: 3000
