$kind: http-example
name: Generated learning insight.
request:
  url: "{{baseUrl}}/api/analytics/generate"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "childId": "98525277-d560-8ab4-5a80-288a60b3639d",
        "period": "last_30_days"
      }
