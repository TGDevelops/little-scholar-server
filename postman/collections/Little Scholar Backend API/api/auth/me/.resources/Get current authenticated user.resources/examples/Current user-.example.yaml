$kind: http-example
name: Current user.
request:
  url: "{{baseUrl}}/api/auth/me"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "data": {
          "user": {
            "id": "7c7912ff-f961-41fd-8b46-b746f2e47cc1",
            "name": "Tejesh Gangari",
            "email": "parent@example.com",
            "city": "Hyderabad",
            "plan": "FREE",
            "createdAt": "2026-05-28T00:00:00.000Z",
            "updatedAt": "2026-05-28T00:00:00.000Z"
          }
        }
      }
order: 1000
