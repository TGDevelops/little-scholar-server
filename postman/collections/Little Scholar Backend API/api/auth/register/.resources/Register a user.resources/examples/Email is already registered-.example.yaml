$kind: http-example
name: Email is already registered.
request:
  url: "{{baseUrl}}/api/auth/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "name": "Tejesh Gangari",
        "email": "parent@example.com",
        "city": "Hyderabad",
        "password": "Password123!"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": {
          "message": "Email is already registered"
        }
      }
order: 3000
