$kind: http-example
name: Request validation failed.
request:
  url: "{{baseUrl}}/api/auth/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "name": "Tejesh Gangari",
        "email": "parent@example.com",
        "city": "Hyderabad",
        "password": "Password123!"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": {
          "message": "Validation failed",
          "details": {
            "body": {
              "email": [
                "Invalid email"
              ]
            }
          }
        }
      }
order: 2000
