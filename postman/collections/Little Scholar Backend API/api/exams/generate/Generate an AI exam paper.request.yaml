$kind: http-request
description: Generates an exam paper with correct answers for local iOS evaluation.
url: "{{baseUrl}}/api/exams/generate"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "grade": "UKG",
      "subject": "Maths",
      "difficulty": "Easy",
      "questionCount": 10
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Generate an AI exam paper.resources/examples
order: 1000
