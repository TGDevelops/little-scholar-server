openapi: 3.1.0
info:
  title: Little Scholar Backend API
  version: 1.0.0
  description: API specification for the Little Scholar iOS backend.
servers:
  - url: http://localhost:3000
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Exams
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Health check
      security: []
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email is already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthError'
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/AuthError'
  /api/exams/generate:
    post:
      tags:
        - Exams
      summary: Generate an AI exam paper
      description: Generates an exam paper with correct answers for local iOS evaluation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateExamRequest'
      responses:
        '201':
          description: Generated exam paper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateExamResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthError'
        '502':
          description: AI provider returned invalid or contract-breaking output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AuthError:
      description: Missing, invalid, or expired access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ApiSuccess:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data: {}
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
            details:
              description: Optional validation or provider details.
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required:
                - status
                - service
                - timestamp
              properties:
                status:
                  type: string
                  example: ok
                service:
                  type: string
                  example: little-scholar-be
                timestamp:
                  type: string
                  format: date-time
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - city
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Tejesh Gangari
        email:
          type: string
          format: email
          maxLength: 254
          example: parent@example.com
        city:
          type: string
          minLength: 1
          maxLength: 100
          example: Hyderabad
        password:
          type: string
          minLength: 8
          maxLength: 128
          example: Password123!
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          example: parent@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          example: Password123!
    User:
      type: object
      required:
        - id
        - name
        - email
        - city
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Tejesh Gangari
        email:
          type: string
          format: email
        city:
          type: string
          example: Hyderabad
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuthPayload:
      type: object
      required:
        - user
        - accessToken
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
          description: JWT access token. Pass as Authorization Bearer token.
    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthPayload'
    MeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/User'
    Grade:
      type: string
      enum:
        - LKG
        - UKG
        - Grade 1
    Subject:
      type: string
      enum:
        - English
        - Maths
        - Hindi
        - EVS
        - GK
    Difficulty:
      type: string
      enum:
        - Easy
        - Medium
        - Hard
    QuestionType:
      type: string
      enum:
        - mcq
        - true_false
        - fill_blank
        - match_following
    GenerateExamRequest:
      type: object
      required:
        - grade
        - subject
        - difficulty
        - questionCount
      properties:
        grade:
          $ref: '#/components/schemas/Grade'
        subject:
          $ref: '#/components/schemas/Subject'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        questionCount:
          type: integer
          minimum: 1
          maximum: 25
          example: 10
    ExamQuestion:
      type: object
      required:
        - id
        - type
        - question
        - correctAnswer
        - explanation
        - topic
        - marks
      properties:
        id:
          type: string
          example: q1
        type:
          $ref: '#/components/schemas/QuestionType'
        question:
          type: string
          example: What comes after 5?
        options:
          type: array
          items:
            type: string
          example:
            - '4'
            - '6'
            - '7'
            - '3'
        correctAnswer:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
              additionalProperties:
                type: string
          example: '6'
        acceptableAnswers:
          type: array
          items:
            type: string
          example:
            - '6'
            - six
        explanation:
          type: string
          example: 6 comes after 5.
        topic:
          type: string
          example: Number sequence
        marks:
          type: integer
          minimum: 1
          example: 1
    ExamPaper:
      type: object
      required:
        - examId
        - grade
        - subject
        - difficulty
        - questionCount
        - questions
      properties:
        examId:
          type: string
          format: uuid
        grade:
          $ref: '#/components/schemas/Grade'
        subject:
          $ref: '#/components/schemas/Subject'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        questionCount:
          type: integer
          minimum: 1
        questions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ExamQuestion'
    GenerateExamResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExamPaper'
